    <!-- FAQ structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is DungeonMessage?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "DungeonMessage is a free web-based messaging tool built for Dungeon Masters and Game Masters running tabletop RPG sessions. It lets GMs send private one-way messages, including text notes, clues, and images, directly to individual players or the entire table during a session, without other players seeing. It works with any tabletop RPG system, including Dungeons and Dragons, Pathfinder, Call of Cthulhu, Blades in the Dark, and any other game where a GM needs to pass private information to players."
            }
          },
          {
            "@type": "Question",
            "name": "How is DungeonMessage different from Discord or a group chat app?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Group chat apps like Discord require all players to create accounts and join a server before a session. DungeonMessage requires nothing from players. The GM creates a session, shares a simple link, and players can receive private messages instantly in their browser with no signup, no registration, and no app to download. It is also purpose-built for one-way GM-to-player communication, so there is no risk of players accidentally seeing messages meant for someone else."
            }
          },
          {
            "@type": "Question",
            "name": "What kind of content can a GM send through DungeonMessage?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "GMs can send text notes, secret clues, lore drops, in-character whispers, images, and map fragments. Messages can go to a single player privately or be broadcast to everyone at the table at once."
            }
          },
          {
            "@type": "Question",
            "name": "Does DungeonMessage work for online games?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Players receive messages through a browser link on their own devices, making DungeonMessage a great companion tool for both in-person sessions and online play via platforms like Roll20, Foundry VTT, or any video call setup."
            }
          },
          {
            "@type": "Question",
            "name": "Is DungeonMessage free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. DungeonMessage is free to use and the core features will always remain free. A premium subscription with additional features is planned for the future, but everything available today will stay free permanently."
            }
          }
        ]
      }
    </script>

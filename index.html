<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>DungeonMessage</title>
    <meta name="description" content="Private messages between Game Masters and players. Share secret notes, clues, and images at the table — without anyone else seeing." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dungeonmessage.com/" />
    <meta property="og:title" content="DungeonMessage" />
    <meta property="og:description" content="Private messages between Game Masters and players. Share secret notes, clues, and images at the table — without anyone else seeing." />
    <meta property="og:image" content="https://dungeonmessage.com/OG_Image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DungeonMessage" />
    <meta name="twitter:description" content="Private messages between Game Masters and players. Share secret notes, clues, and images at the table — without anyone else seeing." />
    <meta name="twitter:image" content="https://dungeonmessage.com/OG_Image.jpg" />
    <link rel="preload" as="image" href="/Logo-horizontal.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Girassol&family=IM+Fell+English&family=Lato:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Vignette overlay — background texture is on body, this just adds the radial gradient. -->
    <div id="page-bg" aria-hidden="true"></div>
    <!-- SVG filter definitions (not rendered) -->
    <svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
      <defs>
        <filter id="h1-inner-shadow" x="-50%" y="-50%" width="200%" height="200%">
          <feFlood flood-color="black" flood-opacity="0.25" result="flood"/>
          <feComposite in="flood" in2="SourceAlpha" operator="in" result="mask"/>
          <feGaussianBlur in="mask" stdDeviation="2" result="blur"/>
          <feOffset dx="0" dy="4" result="offset"/>
          <feComposite in="offset" in2="SourceGraphic" operator="atop"/>
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
